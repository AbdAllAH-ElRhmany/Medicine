<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <title>Valentine 💖</title>

  <style>
    :root{
      --pink: #ffb6c9;
      --card: #ffffff;
      --text: #2b2b2b;
      --yes: #22c55e;
      --no: #ef4444;
    }

    *{ box-sizing: border-box; }

    body{
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--pink);
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      overflow: hidden;
      padding: 18px;
    }

    .card{
      width: min(560px, 92vw);
      background: var(--card);
      border-radius: 18px;
      padding: 46px 22px;
      box-shadow: 0 18px 40px rgba(0,0,0,.18);
      text-align: center;
      position: relative;
    }

    /* Fonts */
    .title{
      font-family: 'Great Vibes', cursive;
      font-size: 42px;
      margin: 0 0 10px;
      line-height: 1.25;
      font-weight: 400;
    }

    .subtitle{
      margin: 0 0 18px;
      font-size: 20px;
      opacity: .9;
    }

    .small{
      font-size: 13px;
      opacity: .75;
      margin-top: 10px;
    }

    /* Buttons area */
    .btns{
      width: 320px;           /* يضمن أنهم جنب بعض مظبوط */
      max-width: 100%;
      height: 64px;           /* مساحة للهروب */
      margin: 8px auto 0;
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      position: relative;     /* عشان زر No يتحرك داخلها */
    }

    button{
      border: 0;
      cursor: pointer;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(0,0,0,.12);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #yesBtn{
      background: var(--yes);
      color: white;
      transition: transform .12s ease, box-shadow .12s ease;
    }
    #yesBtn:hover{ transform: translateY(-2px); }

    /* No: يبدأ جنب Yes (relative) وبعد أول هروب هنحوّله absolute مع انتقال سلس */
    #noBtn{
      background: var(--no);
      color: white;

      position: relative; /* في البداية جنب Yes */
      left: 0;
      top: 0;

      transition: left .32s ease-out, top .32s ease-out, transform .12s ease, opacity .12s ease;
      will-change: left, top;
    }
    #noBtn:hover{ opacity: .95; }

    /* Result */
    .result{
      display: none;
      text-align: center;
    }

    .yay{
      font-family: 'Great Vibes', cursive;
      font-size: 64px;
      margin: 6px 0 6px;
      font-weight: 400;
    }

    .heart{
      font-size: 48px;
      margin: 6px 0 10px;
      display: inline-block;
      animation: pop 1s infinite ease-in-out;
    }

    @keyframes pop{
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    .line{
      margin: 10px 0 16px;
      font-size: 18px;
      font-weight: 600;
      opacity: .92;
    }

    .photo-wrap{
      width: min(360px, 90%);
      margin: 0 auto 10px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 26px rgba(0,0,0,.15);
      border: 3px solid rgba(255,182,201,.6);
    }

    .photo-wrap img{
      width: 100%;
      height: auto;
      display: block;
    }

    .footer{
      margin-top: 8px;
      font-weight: 800;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <div class="card" id="card">
    <!-- Question -->
    <div id="question">
      <h1 class="title">🐧</h1>
      <h1 class="title">Yara, yaryoura, will you be my valentine?</h1>
      <p class="subtitle">💗</p>

      <div class="btns" id="btnArea">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">No</button>
      </div>

      <div class="small">Try clicking “No” 😄</div>
    </div>

    <!-- Result -->
    <div class="result" id="result">
      <div class="yay">YAY!!!</div>
      <div class="heart">❤️</div>

      <div class="line">The ring on your finger won't make you say no 🤫</div>

      <div class="photo-wrap">
        <!-- حط صورتكم بنفس الاسم جنب الملف -->
        <img src="WhatsApp Image 2026-02-13 at 12.21.02 AM.jpeg" alt="Us together" />
      </div>

      <div class="footer">From Abdallah, To Yara 💘</div>
    </div>
  </div>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn  = document.getElementById("noBtn");
    const btnArea = document.getElementById("btnArea");

    const question = document.getElementById("question");
    const result   = document.getElementById("result");

    yesBtn.addEventListener("click", () => {
      question.style.display = "none";
      result.style.display = "block";
    });

    let escapedOnce = false;

    function moveNoButton() {
      const areaRect = btnArea.getBoundingClientRect();

      // أول مرة: حوّل الزر absolute لكن حافظ على مكانه الحالي (جنب Yes)
      if (!escapedOnce) {
        const btnRect = noBtn.getBoundingClientRect();
        const startLeft = btnRect.left - areaRect.left;
        const startTop  = btnRect.top  - areaRect.top;

        noBtn.style.position = "absolute";
        noBtn.style.left = startLeft + "px";
        noBtn.style.top  = startTop  + "px";

        escapedOnce = true;
      }

      // حساب المساحة المتاحة للحركة
      const padding = 6;
      const btnW = noBtn.offsetWidth;
      const btnH = noBtn.offsetHeight;

      const maxX = areaRect.width  - btnW - padding;
      const maxY = areaRect.height - btnH - padding;

      // ابعده عن زر Yes شوية عشان مايبقاش لازق
      const yesRect = yesBtn.getBoundingClientRect();
      const yesCenterX = (yesRect.left + yesRect.right) / 2 - areaRect.left;
      const yesCenterY = (yesRect.top + yesRect.bottom) / 2 - areaRect.top;

      let x, y, tries = 0;
      do {
        x = Math.random() * maxX + padding;
        y = Math.random() * maxY + padding;
        tries++;
      } while (tries < 25 && Math.hypot(x - yesCenterX, y - yesCenterY) < 85);

      noBtn.style.left = x + "px";
      noBtn.style.top  = y + "px";
    }

    // يهرب بس لما تقرب منه
    noBtn.addEventListener("mouseenter", moveNoButton);

    // للموبايل
    noBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      moveNoButton();
    }, { passive: false });
  </script>
</body>
</html>
